name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish win-x86 (requires .NET 8 Desktop Runtime — lower RAM use)
        run: >
          dotnet publish src/Sohoa.ScanAgent/Sohoa.ScanAgent.csproj
          -c Release
          -r win-x86
          --self-contained false
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o publish-x86

      - name: Publish win-x86 standalone (optional, no .NET install needed)
        run: >
          dotnet publish src/Sohoa.ScanAgent/Sohoa.ScanAgent.csproj
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish-x86-standalone

      - name: Publish win-x64 (optional, for 64-bit TWAIN drivers)
        run: >
          dotnet publish src/Sohoa.ScanAgent/Sohoa.ScanAgent.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish-x64

      - name: Package zips
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $x86 = "SohoaScanAgent-$version-win-x86.zip"
          $x86Standalone = "SohoaScanAgent-$version-win-x86-standalone.zip"
          $x64 = "SohoaScanAgent-$version-win-x64.zip"
          Compress-Archive -Path publish-x86/SohoaScanAgent.exe -DestinationPath $x86
          Compress-Archive -Path publish-x86-standalone/SohoaScanAgent.exe -DestinationPath $x86Standalone
          Compress-Archive -Path publish-x64/SohoaScanAgent.exe -DestinationPath $x64
          "ZIP_X86=$x86" >> $env:GITHUB_ENV
          "ZIP_X86_STANDALONE=$x86Standalone" >> $env:GITHUB_ENV
          "ZIP_X64=$x64" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sohoa Scan Agent ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_X86 }}
            ${{ env.ZIP_X86_STANDALONE }}
            ${{ env.ZIP_X64 }}
          body: |
            ## Cài đặt trên máy quét (Windows)

            ### Plustek PS4080U → dùng **win-x86**

            Driver TWAIN Plustek chỉ có bản **32-bit**.

            **Khuyến nghị (nhẹ RAM hơn):** tải **`${{ env.ZIP_X86 }}`** — cần cài [.NET 8 Desktop Runtime x86](https://dotnet.microsoft.com/download/dotnet/8.0).

            **Không muốn cài .NET:** tải **`${{ env.ZIP_X86_STANDALONE }}`** (~75MB, tốn RAM hơn khi chạy).

            1. Giải nén → chạy `SohoaScanAgent.exe`
            2. Kiểm tra `http://127.0.0.1:18612/health` → `processBitness: "x86"` và `twainSources` không rỗng

            Agent: `http://127.0.0.1:18612` (localhost only).
